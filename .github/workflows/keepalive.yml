name: Keepalive Workflow

on:
  schedule:
    - cron: "0 0 1 * *" # 매월 1일 자정 (60일 비활성화 방지)
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Keepalive - prevent scheduled workflow disable
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 50
